deb13cis_sshd_config_file: /etc/ssh/sshd_config

## 5.1.4 Note the following to understand precedence and layout , comma separated
deb13cis_sshd_allow_users: ""
deb13cis_sshd_allow_groups: ""
deb13cis_sshd_deny_users: ""
deb13cis_sshd_deny_groups: ""

deb13cis_sshd_client_alive_interval: 15
deb13cis_sshd_client_alive_count_max: 3

## 5.2.7 set sugroup if differs from wheel
deb13cis_sugroup: nosugroup


## 5.3.3.2.3 Set option used for password complexity
# either mincall or credits - enabling to check for one option in settings
deb13cis_passwd_complex_option: minclass

## 5.4.1.x login.defs password settings
deb13cis_pass_max_days: "365"
deb13cis_pass_min_days: "1"
deb13cis_pass_warn_age: "7"

# Section 6

# Control 6.1.x

# aide setup via - cron, timer
deb13cis_aide_scan: cron

## Logging 6.1.x.x

## syslog
## change to rsyslog/ journald or other
deb13cis_syslog: journald

# Control 6.1.x
## Set if host is a logserver
deb13cis_system_is_log_server: false

# Log server settings
deb13cis_remote_log_host: logagg.example.com
deb13cis_remote_log_port: 514
deb13cis_remote_log_protocol: tcp
deb13cis_remote_log_retrycount: 100
deb13cis_remote_log_queuesize: 1000

deb13cis_rsyslog_stream_cafile: /change/me/to/correct/path
# 6.3
## If using auditd settings
deb13cis_auditd: true

# Control 7.1.12
deb13cis_exclude_unowned_search_path: \(! -path "/run/user/*" -a ! -path "/proc/*" -a ! -path "*/containerd/*" -a ! -path "*/kubelet/pods/*" -a ! -path "*/kubelet/plugins/*" -a ! -path "/sys/fs/cgroup/memory/*" -a ! -path "/var/*/private/*" \)
