---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_2_1_16 }}
    {{ if not .Vars.deb13cis_telnet_server }}
      {{ if not .Vars.deb13cis_telnet_mask }}
package:
  telnet_pkg:
    title: 2.1.16 | Ensure telnet server services are not in use | pkg removed
    name: telnetd-hpa
    installed: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.16
      NIST800-53R5: NA
      {{ end }}
      {{ if .Vars.deb13cis_telnet_mask }}
file:
  telnet_service_masked:
    title: 2.1.16 | Ensure telnet server services are not in use | masked
    path: /etc/systemd/system/inetutils-inetd.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.16
      NIST800-53R5: NA
      {{ end }}
    {{ end }}
  {{ end }}
{{ end }}
