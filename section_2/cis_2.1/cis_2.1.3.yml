---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_2_1_3 }}
    {{ if not .Vars.deb13cis_dhcp_server }}
      {{ if not .Vars.deb13cis_dhcp_mask }}
package:
  dhcp_pkg:
    title: 2.1.3 | Ensure dhcp server services are not in use | pkg removed
    name: kea
    installed: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.3
      NIST800-53R5:
      - CM-7
      {{ end }}
      {{ if .Vars.deb13cis_dhcp_mask }}
file:
{{- range mkSlice "kea-dhcp-ddns-server.service" "kea-dhcp4-server.service" "kea-dhcp6-server.service" }}
  {{ . }}:
    title: 2.1.3 | Ensure dhcp server services are not in use | masked
    path: /etc/systemd/system/{{ . }}
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.3
      NIST800-53R5:
      - CM-7
        {{ end }}
      {{ end }}
    {{ end }}
  {{ end }}
{{ end }}
