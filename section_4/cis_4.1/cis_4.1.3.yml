---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_4_1_3 }}
command:
  ufw_def_incoming_deny:
    title: 4.1.3 | Ensure ufw incoming default is configured
    exec: ufw status verbose | awk -F',' '$1~/Default/ {print $1}'
    exit-status: 0
    stdout:
    - '/^Default: (deny|reject) \(incoming\)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 4.1.3
      NIST800-53R5:
      - SC-7
  {{ end }}
{{ end }}
