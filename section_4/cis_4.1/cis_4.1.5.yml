---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_4_1_5 }}
command:
  ufw_def_routed:
    title: 4.1.5 | Ensure ufw routed default is configured
    exec: ufw status verbose | awk -F',' '$1="Default"{print $3}'
    exit-status: 0
    stdout:
    - '/^\s*(disabled|deny) \(routed\)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 4.1.5
      NIST800-53R5:
      - CM-7
      CCI: CCI-000382
  {{ end }}
{{ end }}
