---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_6_2_3_32 }}
command:
  auditd_init_cnf:
    title: 6.2.3.32 | Ensure kernel "init_module" and "finit_module" loading unloading and modification is collected | conf check
    exec: grep init /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/-a always,exit -F arch=b64 -S init_module,finit_module -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -k kernel_modules/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.3.32
      NIST800-53R5:
      - AU-12
  auditd_init_module_live:
    title: 6.2.3.32 | Ensure kernel "init_module" and "finit_module" loading unloading and modification is collected | running
    exec: auditctl -l | grep init
    exit-status: 0
    stdout:
    - '/-a always,exit -F arch=b64 -S init_module,finit_module -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -F key=kernel_modules/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.3.32
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
