---

{{ if .Vars.deb13cis_level_2 }}
  {{ if not .Vars.deb13cis_apparmor_disable }}
    {{ if .Vars.deb13cis_rule_6_2_3_26 }}
command:
  auditd_MAC_cnf:
    title: 6.2.3.26 | Ensure events that modify the system's Mandatory Access Controls are collected | conf
    exec: grep MAC-policy /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/.*.rules\:-a always,exit -F arch=b64 -S all -F path=/etc/apparmor -F perm=wa -k MAC-policy/'
    - '/.*.rules\:-a always,exit -F arch=b64 -S all -F dir=/etc/apparmor.d -F perm=wa -k MAC-policy/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.3.26
      NIST800-53R5:
      - AU-3
      - CM-6
  auditd_MAC_live:
    title: 6.2.3.26 | Ensure events that modify the system's Mandatory Access Controls are collected | live
    exec: auditctl -l | grep appar
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/apparmor -F perm=wa -F key=MAC-policy'
    - '-a always,exit -F arch=b64 -S all -F dir=/etc/apparmor.d -F perm=wa -F key=MAC-policy'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.3.26
      NIST800-53R5:
      - AU-3
      - CM-6
    {{ end }}
  {{ end }}
{{ end }}
