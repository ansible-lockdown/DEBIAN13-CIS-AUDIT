---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_6_2_3_9 }}
command:
  auditd_NWmgr_cnf:
    title: 6.2.3.9 | Ensure events that modify /etc/NetworkManager directory are collected | conf check
    exec: grep system-locale /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F dir=/etc/NetworkManager/ -F perm=wa -k system-locale'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.3.9
      NIST800-53R5:
      - AU-3
      - CM-6
  auditd_MWmgr_live:
    title: 6.2.3.9 | Ensure events that modify /etc/NetworkManager directory are collected | running
    exec: auditctl -l | grep system-locale
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F dir=/etc/NetworkManager/ -F perm=wa'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.3.9
      NIST800-53R5:
      - AU-3
      - CM-6
  {{ end }}
{{ end }}
