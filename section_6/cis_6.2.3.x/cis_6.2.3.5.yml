---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_6_2_3_5 }}
command:
  auditd_set_cnf:
    title: 6.2.3.5 | Ensure events that modify sethostname and setdomainname are collected | conf check
    exec: grep system-locale /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S sethostname,setdomainname -k system-locale'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.3.5
      NIST800-53R5:
      - AU-3
      - CM-6
  auditd_set_live:
    title: 6.2.3.5 | Ensure events that modify sethostname and setdomainname are collected | running
    exec: auditctl -l | grep system-locale
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S sethostname,setdomainname -F key=system-locale'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.3.5
      NIST800-53R5:
      - AU-3
      - CM-6
  {{ end }}
{{ end }}
