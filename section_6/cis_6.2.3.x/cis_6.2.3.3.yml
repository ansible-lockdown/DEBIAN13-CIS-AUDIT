---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_6_2_3_3 }}
command:
  auditd_sudolog_cnf:
    title: 6.2.3.3 | Ensure events that modify the sudo log file are collected | conf_check
    exec: grep sudo_log /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/var/log/sudo.log -F perm=wa -k sudo_log_file'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.3.3
      NIST800-53R5: NA
  auditd_sudolog_live:
    title: 6.2.3.3 | Ensure events that modify the sudo log file are collected | running
    exec: auditctl -l | grep sudo_log
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/var/log/sudo.log -F perm=wa -F key=sudo_log_file'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.3.3
      NIST800-53R5: NA
  {{ end }}
{{ end }}
