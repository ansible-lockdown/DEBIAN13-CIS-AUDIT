---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_6_2_1_3 }}
command:
  audit_default_grub:
    title: 6.2.1.3 | Ensure auditing for processes that start prior to auditd is enabled | config
    exec: grep audit= /etc/default/grub
    exit-status: 0
    stdout:
    - '/^GRUB_CMDLINE_LINUX_DEFAULT=.*\saudit=1.*/'
    meta:
      server: 2
      CIS_ID:
      - 6.2.1.3
      NIST800-53R5:
      - AU-2
      - AU-3
      - AU-12
  {{ end }}
{{ end }}
