---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_6_1_2_3 }}
command:
  forward_journald_conf:
    title: 6.1.2.3 | Ensure journald is configured to send logs to rsyslog
    exec: grep -i forward /etc/systemd/journald.conf /etc/systemd/journald.conf.d/
    exit-status: 0
    stdout:
    - '/(?i)^\.*:ForwardToSyslog\s*=\s*yes/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.1.2.3
      NIST800-53R5:
      - AC-3
      - AU-2
      - AU-4
      - AU-12
      - MP-2
  {{ end }}
{{ end }}
