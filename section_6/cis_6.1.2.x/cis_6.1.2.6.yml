---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_6_1_2_6 }}
    {{ if not .Vars.deb13cis_remote_log_host }}
command:
  remote_syslog:
    title: 6.1.2.6 | Ensure rsyslog is configured to send logs to a remote log host
    exec: 'grep -E "action.*omfwd.*target" /etc/rsyslog.conf /etc/rsyslog.d/*.conf'
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '*.* action(type="omfwd" target="{{ .Vars.deb13cis_remote_log_host }}" port="{{ .Vars.deb13cis_remote_log_port }}"'
    - protocol="{{ .Vars.deb13cis_remote_log_protocol }}"
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.1.2.6
      NIST800-53R5:
      - AU-6
    {{ end }}
  {{ end }}
{{ end }}
