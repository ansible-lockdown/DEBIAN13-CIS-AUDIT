---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_6_1_2_11 }}
command:
  rsyslog_ca:
    title: 6.1.2.11 | Ensure rsyslog CA certificates are configured
    exec: grep -Psi -- 'DefaultNetstreamDriverCAFile' /etc/rsyslog.conf /etc/rsyslog.d/*.conf
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '.*:/global(DefaultNetstreamDriverCAFile="{{ deb13cis_rsyslog_stream_cafile }}")'
    meta:
      server: 1
      workstation: 2
      CIS_ID:
      - 6.1.2.11
      NIST800-53R5:
      - AU-8
  {{ end }}
{{ end }}
