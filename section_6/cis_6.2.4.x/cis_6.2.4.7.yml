---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_6_2_4_7 }}
command:
  audit_conf_group:
    title: 6.2.4.7 | Ensure audit configuration files group owner is configured
    exec: for file  in `find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \)`; do stat -Lc " %n_%U" $file; done
    exit-status: 0
    stdout:
    - '/.*_root$/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.4.7
      NIST800-53R5:
      - AU-3
  {{ end }}
{{ end }}
