---

{{ if .Vars.deb13cis_level_2 }}
{{ if .Vars.deb13cis_rule_6_2_4_1 }}
command:
  audit_logfile_perms:
    title: 6.2.4.1 | Ensure audit log files mode is configured
    exec: for file in `grep ^log_file /etc/audit/auditd.conf | awk '{ print $NF }'`; do stat -Lc "%n_%a" $file; done
    exit-status: 0
    stdout:
    - '/.*_6(0|4)0$/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.4.1
      NIST800-53R5:
      - AU-3
  {{ end }}
{{ end }}
