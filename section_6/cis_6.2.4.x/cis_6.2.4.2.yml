---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_6_2_4_2 }}
command:
  audit_logfile_owner:
    title: 6.2.4.2 | Ensure audit log files owner is configured
    exec: for file in `grep ^log_file /etc/audit/auditd.conf | awk '{ print $NF }'`; do stat -Lc "%n_%U" $file; done
    exit-status: 0
    stdout:
    - '/.*_root$/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.4.2
      NIST800-53R5:
      - AU-3
  {{ end }}
{{ end }}
