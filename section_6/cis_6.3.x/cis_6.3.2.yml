---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_6_3_2 }}
    {{ if eq .Vars.deb13cis_aide_scan "cron" }}
command:
  aide_cron:
    title: 6.3.2 | Ensure filesystem integrity is regularly checked
    exit-status:
      or:
      - 0
      - 2
    exec: "grep -rs aide /etc/cron.* /etc/crontab /var/spool/cron/*"
    stdout:
    - '!/^#/'
    {{ end }}
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.3.2
      NIST800-53R5:
      - AU-2
# Can be enabled if using timer and service files
service:
    {{ if eq .Vars.deb13cis_aide_scan "timer" }}
  dailyaidecheck:
    title: 6.3.2 | Ensure filesystem integrity is regularly checked
    enabled: true
    skip: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.3.2
      NIST800-53R5:
      - AU-2
  dailyaidecheck.timer:
    title: 6.3.2 | Ensure filesystem integrity is regularly checked
    enabled: true
    running: true
    skip: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.3.2
      NIST800-53R5:
      - AU-2
    {{ end }}
  {{ end }}
{{ end }}
