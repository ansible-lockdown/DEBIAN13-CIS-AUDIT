---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_6_2_2_3 }}
file:
  logs_full_auditd_conf:
    title: 6.2.2.3 | Ensure system is disabled when audit logs are full
    exists: true
    path: /etc/audit/auditd.conf
    contents:
    - '/^\s*disk_full_action\s*=\s*(halt|single)/'
    - '/^\s*disk_error_action\s*=\s*(syslog|halt|single)/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.2.3
      NIST800-53R5:
      - AU-2
      - AU-8
      - AU-12
      - SI-5
  {{ end }}
{{ end }}
