---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_6_2_2_2 }}
command:
  max_log_action_auditd_conf:
    title: 6.2.2.2 | Ensure audit logs are not automatically deleted
    exec: grep max_log_file_action /etc/audit/auditd.conf
    exit-status: 0
    stdout:
    - 'max_log_file_action = keep_logs'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.2.2.2
      NIST800-53R5:
      - AU-8
  {{ end }}
{{ end }}
