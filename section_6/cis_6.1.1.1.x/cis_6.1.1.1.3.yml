---

{{ if .Vars.deb13cis_level_1 }}
  {{ if eq .Vars.deb13cis_syslog "journald"}}
   {{ if .Vars.deb13cis_rule_6_1_1_1_3 }}
command:
  log_rotate_journald_conf:
    title: 6.1.1.1.3 | Ensure journald log file rotation is configured
    exec: grep -Ei "max|keep" /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf
    exit-status: 0
    stdout:
    - '/.*\:SystemMaxUse=/'
    - '/.*\:SystemKeepFree=/'
    - '/.*\:RuntimeMaxUse=/'
    - '/.*\:RuntimeKeepFree=/'
    - '/.*\:MaxFileSec=/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.1.1.1.3
      NIST800-53R5:
      - AU-2
      - AU-7
      - AU-12
    {{ end }}
  {{ end }}
{{ end }}
