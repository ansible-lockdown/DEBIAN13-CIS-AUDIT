---

{{ if .Vars.deb13cis_level_1 }}
  {{ if eq .Vars.deb13cis_syslog "journald"}}
    {{ if .Vars.deb13cis_rule_6_1_1_1_2 }}
command:
  /etc/tmpfiles.d/systemd.conf:
    title: 6.1.1.1.2 | Ensure journald log file access is configured | Manual Check Required
    exec: echo "Manual - Please check journald default permissions"
    exit-status: 0
    stdout:
    - '!/^Manual/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.1.1.1.2
      NIST800-53R5:
      - AC-3
      - AU-2
      - AU-12
      - MP-2
      - SI-5
    {{ end }}
  {{ end }}
{{ end }}
