---

{{ if .Vars.deb13cis_level_1 }}
  {{ if eq .Vars.deb13cis_syslog "journald"}}
    {{ if .Vars.deb13cis_rule_6_1_1_1_5 }}
command:
  storage_journald_conf:
    title: 6.1.1.1.5 | Ensure journald Storage is configured
    exec: grep -i Storage= /etc/systemd/journald.conf /etc/systemd/journald.conf.d/*.conf
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/.*\:Storage=persistent/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.1.1.1.5
      NIST800-53R5:
      - AU-3
      - AU-12
    {{ end }}
  {{ end }}
{{ end }}
