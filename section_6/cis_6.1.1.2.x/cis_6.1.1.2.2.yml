---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_6_1_1_2_2 }}
    {{ if not .Vars.deb13cis_system_is_log_server }}
file:
  journal_remote_configured:
    title: 6.1.1.2.2 | Ensure systemd-journal-upload authentication is configured
    path: /etc/systemd/journal-upload.conf
    exists: true
    contents:
    - '/^URL=/'
    - '/ServerKeyFile=.*.pem'
    - '/ServerCertificateFile=.*.pem'
    - '/TrustedCertificateFile=.*.pem'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.1.1.2.2
      NIST800-53R5:
      - AU-2
      - AU-12
    {{ end }}
  {{ end }}
{{ end }}
