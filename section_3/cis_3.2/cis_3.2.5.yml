---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_3_2_4 }}
command:
  modprobe_sctp:
    title: 3.2.5 | Ensure sctp kernel module is not available | sctp config
    exit-status: 0
    exec: 'modprobe -n -v sctp'
    stdout:
      - '/install /bin/(true|false)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.2.5
      NIST800-53R5:
      - CM-7
      CCI: CCI-000381
  lsmod_sctp:
    title: 3.2.5 | Ensure sctp kernel module is not available | running sctp
    exit-status: 1
    exec: lsmod | grep -i sctp
    stdout:
    - '!/^.*/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.2.5
      NIST800-53R5:
      - CM-7
      CCI: CCI-000381
  {{ end }}
{{ end }}
