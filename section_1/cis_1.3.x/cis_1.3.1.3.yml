---

{{ if .Vars.deb13cis_level_2 }}
  {{ if not .Vars.deb13cis_apparmor_disable }}
    {{ if .Vars.deb13cis_rule_1_3_1_3 }}
command:
  apparmor_enf_only:
    title: 1.3.1.3 | Ensure all AppArmor Profiles are enforcing
    exec: if [ `apparmor_status | grep 'profiles are in complain mode.' | awk '{print $1}'` == 0 ]; then echo "Not Enforcing" ;fi
    exit-status: 0
    stdout:
    - '!/Not Enforcing/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.3.1.3
      NIST800-53R5: AC-3
    {{ end }}
  {{ end }}
{{ end }}
