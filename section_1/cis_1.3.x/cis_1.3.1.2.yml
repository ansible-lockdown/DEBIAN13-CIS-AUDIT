---

{{ if not .Vars.deb13cis_apparmor_disable }}
  {{ if .Vars.deb13cis_level_1 }}
    {{ if .Vars.deb13cis_rule_1_3_1_2 }}
file:
  apparmor_enabled_boot:
    title: 1.3.1.2 | Ensure AppArmor is enabled
    exists: true
    path: /etc/default/grub
    contents:
    - '!/GRUB_CMDLINE_LINUX_DEFAULT=.*apparmor=0/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.3.1.2
      NIST800-53R5:
      - AC-3
    {{ end }}
  {{ end }}
{{ end }}
