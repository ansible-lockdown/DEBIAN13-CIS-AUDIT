---

{{ if .Vars.deb13cis_level_1 }}
file:
  {{ if .Vars.deb13cis_rule_1_6_6 }}
  etc_issue_net_perms:
    title: 1.6.6 | Ensure access to /etc/issue.net is configured
    path: /etc/issue.net
    exists: true
    mode:
      or:
      - "0644"
      - "0640"
      - "0600"
    owner: root
    group: root
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.6.6
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
