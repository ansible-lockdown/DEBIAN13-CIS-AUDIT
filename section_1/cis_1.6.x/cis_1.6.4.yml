---

{{ if .Vars.deb13cis_level_1 }}
file:
  {{ if .Vars.deb13cis_rule_1_6_4 }}
  motd_perms:
    title: 1.6.4 | Ensure access to /etc/motd is configured
    path: /etc/motd
    exists:
      or:
      - true
      - false
    mode:
      or:
      - "0644"
      - "0640"
      - "0600"
    owner: root
    group: root
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.6.4
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
