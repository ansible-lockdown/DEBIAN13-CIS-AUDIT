---

{{ if .Vars.deb13cis_desktop_required }}
  {{ if .Vars.deb13cis_level_1 }}
    {{ if .Vars.deb13cis_rule_1_7_2 }}
command:
  gdm_profile_banner:
    title: 1.7.2 | Ensure GDM login banner is configured
    exec: gsettings get org.gnome.login-screen banner-message-enable
    exit-status: 0
    stdout:
    - '/^true/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.7.2
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
  gdm_profile_banner:
    title: 1.7.2 | Ensure GDM login banner is configured
    exec: gsettings get org.gnome.login-screen banner-message-text
    exit-status: 0
    stdout:
    - '{{ .Vars.deb13cis_warning_banner }}'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.7.2
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
    {{ end }}
  {{ end }}
{{ end }}
