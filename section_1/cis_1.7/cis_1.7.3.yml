---

{{ if .Vars.deb13cis_gui }}
  {{ if .Vars.deb13cis_level_1 }}
    {{ if .Vars.deb13cis_rule_1_7_3 }}
command:
  gdm_last_login:
    title: 1.7.3 | Ensure GDM disable-user-list option is enabled
    exec: gsettings get org.gnome.login-screen disable-user-list
    exit-status: 0
    stdout:
    - '/^true/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.7.3
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
    {{ end }}
  {{ end }}
{{ end }}
