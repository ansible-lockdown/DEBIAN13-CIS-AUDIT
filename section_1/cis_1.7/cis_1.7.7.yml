---

{{ if .Vars.deb13cis_desktop_required }}
  {{ if .Vars.deb13cis_level_1 }}
    {{ if .Vars.deb13cis_rule_1_7_7 }}
file:
  00-media-autorun_override:
    title: 1.7.7 | Ensure GDM disabling automatic mounting of removable media is not overridden
    path: /etc/dconf/db/{ .Vars.deb13cis_dconf_db_name }.d/00-media-autorun
    exists: true
    contents:
    - '[org/gnome/desktop/media-handling]'
    - 'automount=false'
    - 'automount-open=false'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.7.7
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
    {{ end }}
  {{ end }}
{{ end }}
