---

{{ if .Vars.deb13cis_desktop_required }}
  {{ if .Vars.deb13cis_level_1 }}
    {{ if .Vars.deb13cis_rule_1_7_9 }}
file:
  00-autorun_lock_never:
    title: 1.7.9 | Ensure GDM autorun-never is not overridden
    path: /etc/dconf/db/{ .Vars.deb13cis_dconf_db_name }.d/locks/00-autorun_lock
    exists: true
    contents:
    - '[org/gnome/desktop/media-handling]'
    - '/^autorun-never=true/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.7.9
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
    {{ end }}
  {{ end }}
{{ end }}
