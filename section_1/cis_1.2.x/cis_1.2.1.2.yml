---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.run_heavy_tests }}
    {{ if .Vars.deb13cis_rule_1_2_1_2 }}
command:
  apt_weak_deps:
    title: 1.2.1.2 | Ensure weak dependencies are configured
    exit-status: 0
    exec: /usr/bin/apt-config dump | /usr/bin/grep "APT::Install-"
    stdout:
    - '/APT::Install-Recommends "0";/'
    - '/APT::Install-Suggests "0";/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.2.1.2
      NIST800-53R5: NA
    {{ end }}
  {{ end }}
{{ end }}
