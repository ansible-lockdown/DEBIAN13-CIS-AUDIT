---

{{ if .Vars.deb13cis_level_1 }}
    {{ if .Vars.deb13cis_rule_1_2_1_6 }}
command:
  apt_auth_conf_files:
    title: 1.2.1.6 | Ensure access to files in the /etc/apt/auth.conf.d/ directory is configured
    exec: "stat -Lc 'Access: (%a/%A) Uid: ( %u/ %U) Gid: ( %g/ %G)' /etc/apt/auth.conf.d/* 2>/dev/null"
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '!/.*/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.2.1.6
      NIST800-53R5: NA
  {{ end }}
{{ end }}
