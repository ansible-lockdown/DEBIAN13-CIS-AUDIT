---

{{ if .Vars.deb13cis_level_2 }}
    {{ if .Vars.deb13cis_rule_1_2_1_5 }}
file:
  apt_auth_conf_dir:
    title: 1.2.1.5 | Ensure access to /etc/apt/auth.conf.d directory is configured
    path: /etc/apt/auth.conf.d
    filetype: directory
    exists: true
    owner: root
    group: root
    mode:
      or:
      - "0755"
      - "0750"
      - "0700"
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.2.1.5
      NIST800-53R5: NA
  {{ end }}
{{ end }}
