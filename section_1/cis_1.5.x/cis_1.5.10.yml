---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_1_5_10 }}
kernel-param:
  ptrace_restricted_live_2:
    title: 1.5.10 | Ensure kernel.yama.ptrace_scope is configured | running
    value:
      or:
      - 1
      - 2
      - 3
    name: kernel.yama.ptrace_scope
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.10
      NIST800-53R5: CM-6
      CCI: CCI-000366
command:
  ptrace_restricted_conf_2:
    title: 1.5.10 | Ensure kernel.yama.ptrace_scope is configured | conf
    exit-status:
      or:
      - 0
      - 1
      - 2
    exec: 'grep "kernel\.yama\.ptrace_scope" /etc/sysctl.conf /etc/sysctl.d/*'
    stdout:
    - '/^*.conf:kernel.yama.ptrace_scope\s*=\s*(1|2|3)$/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.10
      NIST800-53R5: CM-6
      CCI: CCI-000366
  {{ end }}
{{ end }}
