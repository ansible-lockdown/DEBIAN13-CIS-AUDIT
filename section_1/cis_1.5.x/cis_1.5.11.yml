---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_1_5_11 }}
command:
  system_coredump_conf:
    title: 1.5.11 | Ensure core file size is configured
    exec: grep -Ps -- '^\h*\*\h+hard\h+core\h+0\b' /etc/security/limits.conf /etc/security/limits.d/*
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '/^*.conf:\* hard core 0/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.11
      NIST800-53R5: CM-6
      CCI: CCI-000366
kernel-param:
  fs.suid_dumpable_sysctl:
    title: 1.5.11 | Ensure core file size is configured
    value: '0'
    name: fs.suid_dumpable
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.11
      NIST800-53R5: CM-6
      CCI: CCI-000366
  {{ end }}
{{ end }}
