---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_1_5_13 }}
command:
  coredump_storage_conf:
    title: 1.5.13 | Ensure systemd-coredump Storage is configured
    exec: grep -Ri '^Storage' /etc/systemd/coredump.conf.d/*
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '/^*.conf:Storage\s*=\s*none/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.13
      NIST800-53R5: CM-6
      CCI: CCI-000366
  {{ end }}
{{ end }}
