---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_7_1_8 }}
file:
  etc_gshadow-_perms:
    title: 7.1.8 | Ensure permissions on /etc/gshadow- are configured
    path: /etc/gshadow-
    exists: true
    mode:
      or:
      - '0644'
      - '0640'
      - '0600'
      - '0400'
    owner: root
    group: root
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 7.1.8
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
