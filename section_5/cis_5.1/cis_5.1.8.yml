---

{{ if .Vars.deb13cis_level_2 }}
  {{ if .Vars.deb13cis_rule_5_1_8 }}
file:
  sshd_disableforwarding:
    title: 5.1.8 | Ensure sshd DisableForwarding is enabled
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    - 'DisableForwarding yes'
    - '!/^DisableForwarding no/'
    meta:
      server: 2
      workstation: 1
      CIS_ID:
      - 5.1.8
      NIST800-53R5:
      - CM-7
  {{ end }}
{{ end }}
