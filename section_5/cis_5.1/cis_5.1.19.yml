---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_5_1_19 }}
file:
  ssh_maxstartups:
    title: 5.1.19 | Ensure sshd MaxStartups is configured
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    - 'MaxStartups 10:30:60'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.19
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
  {{ end }}
{{ end }}
