---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_5_1_20 }}
file:
  ssh_empty_passwd:
    title: 5.1.20 | Ensure sshd PermitEmptyPasswords is disabled
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    - '/(?i)^PermitEmptyPasswords no/'
    - '!/(?i)^PermitEmptyPasswords yes/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.20
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
  {{ end }}
{{ end }}
