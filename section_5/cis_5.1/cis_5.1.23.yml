---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_5_1_23 }}
file:
  ssh_usepam:
    title: 5.1.23 | Ensure sshd UsePAM is enabled
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    - '/(?i)UsePAM yes/'
    - '!/(?i)^UsePAM no/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.23
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
  {{ end }}
{{ end }}
