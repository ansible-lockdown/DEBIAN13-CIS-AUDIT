    stdout:
    - '/sntrup761x25519-sha512@openssh.com/'
    - '/mlkem768x25519-sha256/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.13
      NIST800-53R5: NA
  {{ end }}
{{ end }}
