---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_5_1_14 }}
file:
  ssh_logingrace:
    title: 5.1.14 | Ensure sshd LoginGraceTime is configured
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    - '/(?i)^LoginGraceTime ([1-9]|[1-5][0-9]|60)$/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.14
      NIST800-53R5:
      - CM-6
  {{ end }}
{{ end }}
