---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_5_1_12 }}
command:
  sshd_KEX:
    title: 5.1.12 | Ensure sshd KexAlgorithms is configured
    command: sshd -T | grep -Pi -- 'kexalgorithms\h+([^#\n\r]+,)?(diffie-hellman-group1-sha1|diffie-hellman-group14-sha1|diffie-hellman-group-exchange-sha1)\b'
    exit-status:
      or:
      - 0
      - 1
    stdout: ['!/./']
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.12
      NIST800-53R5:
      - SC-8
  {{ end }}
{{ end }}
