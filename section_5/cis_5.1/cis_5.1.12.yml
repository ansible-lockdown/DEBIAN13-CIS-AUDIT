---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_5_1_12 }}
file:
  sshd_KEX:
    title: 5.1.12 | Ensure sshd KexAlgorithms is configured
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    {{ range .Vars.deb13cis_ssh_strong_kex }}
    - '/^KexAlgorithms.*{{ . }}/'
    {{ end }}
    {{ range .Vars.deb13cis_ssh_weak_kex }}
    - '!/^KexAlgorithms.*!{{ . }}/'
    {{ end }}
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.12
      NIST800-53R5:
      - SC-8
  {{ end }}
{{ end }}
