---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_5_1_15 }}
file:
  ssh_loglevel:
    title: 5.1.15 | Ensure sshd LogLevel is configured
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    - '/LogLevel (VERBOSE|INFO)/'
    - '!/^LogLevel DEBUG/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.15
      NIST800-53R5:
      - AU-3
      - AU-12
      - SI-5
 {{ end }}
{{ end }}
