---

{{ if .Vars.deb13cis_level_1 }}
  {{ if .Vars.deb13cis_rule_5_1_21 }}
file:
  ssh_permit_root:
    title: 5.1.21 | Ensure sshd PermitRootLogin is disabled
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    - '/(?i)^PermitRootLogin no/'
    - '!/(?i)^PermitRootLogin yes/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.21
      NIST800-53R5:
      - AC-6
  {{ end }}
{{ end }}
